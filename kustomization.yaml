apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
- pairs:
    app.kubernetes.io/managed-by: argocd

resources:
  # Monitoring
  - manifests/monitoring/namespace.yaml
  - manifests/monitoring/node-exporter.yaml
  
  # Heimdall
  - manifests/heimdall/namespace.yaml
  - manifests/heimdall/deployment.yaml
  
  # Vaultwarden
  - manifests/vaultwarden/namespace.yaml
  - manifests/vaultwarden/deployment.yaml
  
  # Code Server
  - manifests/code-server/namespace.yaml
  - manifests/code-server/deployment.yaml
  
  # Grafana
  - manifests/grafana/namespace.yaml
  - manifests/grafana/deployment.yaml
  
  # Prometheus
  - manifests/prometheus/namespace.yaml
  - manifests/prometheus/configmap.yaml
  - manifests/prometheus/rbac.yaml  #
  - manifests/prometheus/deployment.yaml

  # Vault Secret Manager
  - manifests/vault/namespace.yaml
  - manifests/vault/application.yaml

  # Ollama GPU
  - manifests/ollama/namespace.yaml
  - manifests/ollama/rbac.yaml
  - manifests/ollama/pvc.yaml
  - manifests/ollama/service.yaml
  - manifests/ollama/deployment.yaml

  # Joplin Server
  - manifests/joplin/namespace.yaml
  - manifests/joplin/rbac.yaml
  - manifests/joplin/secret.yaml
  - manifests/joplin/deployment.yaml
  - manifests/joplin/service.yaml
  - manifests/joplin/ingress.yaml
  # Browser Service
  - manifests/browser-service/namespace.yaml
  - manifests/browser-service/rbac.yaml
  - manifests/browser-service/deployment.yaml
  - manifests/browser-service/service.yaml
  
  # Research Worker
  - manifests/research-worker/namespace.yaml
  - manifests/research-worker/rbac.yaml
  - manifests/research-worker/configmap.yaml
  - manifests/research-worker/cronjob.yaml