name: secret-scan

on:
  push:
    branches:
      - main
  pull_request:

# Block merges if gitleaks finds secrets in the diff or in repo HEAD.
# Config lives in .gitleaks.toml at repo root.

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with full history for thorough scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_ENABLE_COMMENTS and similar are optional — default is fine
        with:
          # Use the repo's .gitleaks.toml
          config-path: .gitleaks.toml
