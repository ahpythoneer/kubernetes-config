apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: prometheus
data:
  alerts.yml: |
    groups:
    - name: kubernetes.rules
      interval: 30s
      rules:
      
      # Node CPU Alert
      - alert: NodeHighCPU
        expr: (100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.instance }} has high CPU"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"
      
      # Node Memory Alert
      - alert: NodeHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.instance }} has high memory usage"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"
      
      # Node Disk Alert
      - alert: NodeHighDisk
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.instance }} has high disk usage"
          description: "Disk usage is {{ $value }}% on {{ $labels.instance }}"
      
      # Kubernetes Pod Pending
      - alert: KubernetesPodPending
        expr: sum by (namespace, pod) (kube_pod_status_phase{phase="Pending"}) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} in {{ $labels.namespace }} is pending"
      
      # ArgoCD Sync Failure
      - alert: ArgoCDSyncFailed
        expr: argocd_app_sync_total{phase="Failed"} > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ArgoCD application sync failed"
          description: "Application sync failed in ArgoCD"