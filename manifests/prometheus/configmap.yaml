apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
    
    scrape_configs:
    
    # Prometheus itself
    - job_name: 'prometheus'
      static_configs:
      - targets: ['localhost:9090']
    
    # Node Exporter (all 4 nodes)
    - job_name: 'node-exporter'
      static_configs:
      - targets:
        - '10.0.0.100:9100'
        - '10.0.0.101:9100'
        - '10.0.0.103:9100'
        - '10.0.0.104:9100'
    
    # Grafana
    - job_name: 'grafana'
      static_configs:
      - targets: ['grafana.grafana.svc.cluster.local:3000']
      metrics_path: '/metrics'
    
    # ArgoCD Server
    - job_name: 'argocd-server'
      static_configs:
      - targets: ['argocd-server.argocd.svc.cluster.local:8083']
    
    # ArgoCD Controller
    - job_name: 'argocd-controller'
      static_configs:
      - targets: ['argocd-application-controller.argocd.svc.cluster.local:8085']
    
    # ArgoCD Repo Server
    - job_name: 'argocd-repo-server'
      static_configs:
      - targets: ['argocd-repo-server.argocd.svc.cluster.local:8084']
    
    # Kubernetes Nodes
    - job_name: 'kubernetes-nodes'
      kubernetes_sd_configs:
      - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)