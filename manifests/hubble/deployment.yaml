apiVersion: v1
kind: Service
metadata:
  name: hubble-ui
  namespace: hubble
spec:
  type: LoadBalancer
  loadBalancerIP: 10.0.0.162
  ports:
  - port: 80
    targetPort: 8081
    name: http
  selector:
    app: hubble-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hubble-ui
  namespace: hubble
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hubble-ui
  template:
    metadata:
      labels:
        app: hubble-ui
    spec:
      serviceAccountName: hubble-ui
      containers:
      - name: hubble-ui
        image: quay.io/cilium/hubble-ui:v0.13.0
        ports:
        - containerPort: 8081
        env:
        - name: HUBBLE_METRICS_PORT
          value: "6543"
        - name: HUBBLE_SERVER
          value: "hubble-relay.kube-system.svc.cluster.local:80"
        - name: HUBBLE_UI_BACKEND_PORT
          value: "8090"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hubble-ui
  namespace: hubble
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hubble-ui
rules:
- apiGroups: [""]
  resources: ["componentstatuses"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hubble-ui
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hubble-ui
subjects:
- kind: ServiceAccount
  name: hubble-ui
  namespace: hubble