apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
    scrape_configs:
    - job_name: 'prometheus'
      static_configs:
      - targets: ['localhost:9090']
    
    - job_name: 'kubernetes'
      kubernetes_sd_configs:
      - role: node
    
    - job_name: 'node-exporter'
      kubernetes_sd_configs:
      - role: endpoints
      relabel_configs:
      - source_labels: [__meta_kubernetes_endpoints_name]
        regex: 'node-exporter'
        action: keep
    
    - job_name: 'grafana'
      static_configs:
      - targets: ['grafana.grafana.svc.cluster.local:3000']
    
    - job_name: 'code-server'
      static_configs:
      - targets: ['code-server.code-server.svc.cluster.local']