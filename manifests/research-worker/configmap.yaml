apiVersion: v1
kind: ConfigMap
metadata:
  name: research-scripts
  namespace: research-worker
data:
  enhance_notes.py: |
    #!/usr/bin/env python3
    import os
    import requests
    import json
    from datetime import datetime
    
    JOPLIN_HOST = os.getenv('JOPLIN_HOST', 'http://joplin-server.joplin:22300')
    OLLAMA_HOST = os.getenv('OLLAMA_HOST', 'http://ollama.ollama:11434')
    BROWSER_HOST = os.getenv('BROWSER_HOST', 'http://browser-service.browser-service:3000')
    
    def get_notes_needing_enhancement():
        """Get notes tagged for enhancement"""
        try:
            token = os.getenv('JOPLIN_TOKEN')
            headers = {'Authorization': f'Bearer {token}'}
            response = requests.get(
                f'{JOPLIN_HOST}/api/notes',
                headers=headers,
                params={'tags': 'needs-enhancement'}
            )
            return response.json().get('items', [])
        except Exception as e:
            print(f"Error getting notes: {e}")
            return []
    
    def call_ollama(model, prompt):
        """Call Ollama API"""
        try:
            response = requests.post(
                f'{OLLAMA_HOST}/api/generate',
                json={'model': model, 'prompt': prompt, 'stream': False},
                timeout=300
            )
            return response.json().get('response', '')
        except Exception as e:
            print(f"Error calling Ollama: {e}")
            return ''
    
    if __name__ == '__main__':
        print(f"Research worker started at {datetime.now()}")
        notes = get_notes_needing_enhancement()
        print(f"Found {len(notes)} notes to enhance")