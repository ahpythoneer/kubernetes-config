apiVersion: v1
kind: ServiceAccount
metadata:
  name: research-worker
  namespace: research-worker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: research-worker
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: research-worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: research-worker
subjects:
- kind: ServiceAccount
  name: research-worker
  namespace: research-worker