apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      affinity:
              nodeAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                    - key: workload.ai
                      operator: In
                      values:
                      - ollama
      
      serviceAccountName: ollama
      
      containers:
      - name: ollama
        image: ollama/ollama:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: http
          containerPort: 11434
        
        env:
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
        
        resources:
          requests:
            nvidia.com/gpu: 1
            memory: "4Gi"
            cpu: "2"
          limits:
            nvidia.com/gpu: 1
            memory: "12Gi"
            cpu: "4"
        
        volumeMounts:
        - name: ollama-models
          mountPath: /root/.ollama/models
        
        securityContext:
          privileged: true
      
      volumes:
      - name: ollama-models
        persistentVolumeClaim:
          claimName: ollama-models