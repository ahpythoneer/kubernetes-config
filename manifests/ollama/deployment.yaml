apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "ollama"
        vault.hashicorp.com/agent-inject-secret-ollama: "secret/data/ollama/config"
        vault.hashicorp.com/agent-inject-template-ollama: |
          {{- with secret "secret/data/ollama/config" -}}
          export OLLAMA_API_KEY="{{ .Data.data.api_key }}"
          {{- end }}
    spec:
      # Deploy on GPU node
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - infwk8s-n01
      
      serviceAccountName: ollama
      
      containers:
      - name: ollama
        image: ollama/ollama:latest
        
        ports:
        - name: http
          containerPort: 11434
        
        env:
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
        - name: OLLAMA_MODELS
          value: "/root/.ollama/models"
        
        # GPU resources
        resources:
          requests:
            nvidia.com/gpu: 1
            memory: "8Gi"
            cpu: "4"
          limits:
            nvidia.com/gpu: 1
            memory: "16Gi"
            cpu: "8"
        
        volumeMounts:
        - name: ollama-models
          mountPath: /root/.ollama/models
        - name: ollama-cache
          mountPath: /root/.cache
      
      volumes:
      - name: ollama-models
        persistentVolumeClaim:
          claimName: ollama-models
      - name: ollama-cache
        emptyDir: {}