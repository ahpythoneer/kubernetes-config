apiVersion: v1
kind: ServiceAccount
metadata:
  name: ollama
  namespace: ollama
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ollama
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ollama
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ollama
subjects:
- kind: ServiceAccount
  name: ollama
  namespace: ollama