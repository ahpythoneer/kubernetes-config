apiVersion: apps/v1
kind: Deployment
metadata:
  name: joplin-server
  namespace: joplin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: joplin-server
  template:
    metadata:
      labels:
        app: joplin-server
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "joplin"
        vault.hashicorp.com/agent-inject-secret-db: "secret/data/joplin/database"
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "secret/data/joplin/database" -}}
          postgres_user={{ .Data.data.postgres_user }}
          postgres_password={{ .Data.data.postgres_password }}
          postgres_host={{ .Data.data.postgres_host }}
          postgres_port={{ .Data.data.postgres_port }}
          postgres_database={{ .Data.data.database_name }}
          {{- end }}
    spec:
      serviceAccountName: joplin
      containers:
      - name: joplin-server
        image: joplin/server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 22300
          protocol: TCP
        env:
        - name: APP_BASE_URL
          value: "https://joplin.racktocloud.com"
        - name: DB_CLIENT
          value: "pg"
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: joplin-db
              key: postgres_host
        - name: POSTGRES_PORT
          valueFrom:
            secretKeyRef:
              name: joplin-db
              key: postgres_port
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: joplin-db
              key: postgres_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: joplin-db
              key: postgres_password
        - name: POSTGRES_DATABASE
          valueFrom:
            secretKeyRef:
              name: joplin-db
              key: postgres_database
        livenessProbe:
          httpGet:
            path: /api/ping
            port: 22300
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/ping
            port: 22300
          initialDelaySeconds: 30
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"