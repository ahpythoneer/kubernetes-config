apiVersion: apps/v1
kind: Deployment
metadata:
  name: joplin-server
  namespace: joplin
  labels:
    app: joplin-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: joplin-server
  template:
    metadata:
      labels:
        app: joplin-server
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "joplin"
    spec:
      serviceAccountName: joplin
      containers:
      - name: joplin-server
        image: joplin/server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 22300
          protocol: TCP
        env:
        - name: APP_BASE_URL
          value: "https://joplin.racktocloud.com"
        - name: DB_CLIENT
          value: "pg"
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: joplin-db
              key: postgres_host
        - name: POSTGRES_PORT
          valueFrom:
            secretKeyRef:
              name: joplin-db
              key: postgres_port
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: joplin-db
              key: postgres_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: joplin-db
              key: postgres_password
        - name: POSTGRES_DATABASE
          valueFrom:
            secretKeyRef:
              name: joplin-db
              key: postgres_database
        # NO HEALTH CHECKS - Joplin works fine!
        # Remove the CORS issues by not checking at all
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"